<div id="view-cadastro" style="display: none; background-color: #f9fafb; min-height: 100vh;">
    <!-- Head/Header Style Migration -->
    <style>
        .cadastro-container {
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .cadastro-container {
                padding: 2rem;
            }
        }

        .cadastro-header {
            margin-bottom: 2.5rem;
        }

        .cadastro-title {
            font-family: 'Manrope', sans-serif;
            font-size: 1.875rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        @media (min-width: 768px) {
            .cadastro-title {
                font-size: 2.25rem;
            }
        }

        .cadastro-subtitle {
            color: #4b5563;
            font-weight: 500;
        }

        .tabs-container {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 2rem;
            background-color: #e5e7eb;
            padding: 0.375rem;
            border-radius: 9999px;
            width: fit-content;
        }

        .tab-btn {
            padding: 0.625rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .tab-btn {
                padding: 0.625rem 2rem;
            }
        }

        .tab-btn.active {
            background-color: white;
            color: #2563eb;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .tab-btn.inactive {
            color: #4b5563;
            background: transparent;
        }

        .tab-btn.inactive:hover {
            background-color: #d1d5db;
        }

        .section-header {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 640px) {
            .section-header {
                flex-direction: row;
                align-items: center;
            }
        }

        .section-title {
            font-family: 'Manrope', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #3b82f6;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        /* Grid Layout for CRUD */
        .crud-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .crud-grid {
                grid-template-columns: 1fr 1.5fr;
            }
        }

        .card-cadastro {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #3b82f6;
        }

        .card-cadastro.sub {
            border-left-color: #a855f7;
        }

        .input-cadastro {
            width: 100%;
            padding: 0.625rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-cadastro:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }

        .lista-itens {
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #f3f4f6;
            transition: background 0.2s;
        }

        .item-row:hover {
            background-color: #f9fafb;
        }

        .btn-action-del {
            color: #ef4444;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 0.375rem;
        }

        .btn-action-del:hover {
            background-color: #fee2e2;
        }
    </style>

    <div class="cadastro-container">
        <!-- HEADER -->
        <div class="cadastro-header">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1 class="cadastro-title">Cadastro Geral</h1>
                    <p class="cadastro-subtitle">Gerenciamento centralizado de especialidades, produtos e corpo clínico.
                    </p>
                </div>
                <button class="tab-btn inactive" onclick="alternarTela('principal')" style="background: #f3f4f6;">
                    <span class="material-icons" style="vertical-align: middle; font-size: 18px;">arrow_back</span>
                    Voltar
                </button>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs-container">
            <button class="tab-btn active">Especialidades e Produtos</button>
            <button class="tab-btn inactive"
                onclick="mostrarMensagem('Novidade', 'Gestão de Especialidades em breve!')">Especialistas</button>
        </div>

        <!-- CONTENT -->
        <div class="space-y-8">
            <div class="section-header">
                <h3 class="section-title"><span class="material-icons">category</span> Estrutura Hierárquica</h3>
            </div>

            <div class="crud-grid">
                <!-- COLUNA 1: ESPECIALIDADES -->
                <div class="card-cadastro">
                    <h4 style="margin-top: 0; color: #3b82f6; font-weight: 700; margin-bottom: 1rem;">Especialidades
                    </h4>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                        <input type="text" id="nova-especialidade" class="input-cadastro"
                            placeholder="Ex: Psicologia, Nutrição...">
                        <button class="btn-primary" onclick="salvarEspecialidade()" style="padding: 0.5rem;">
                            <span class="material-icons">add</span>
                        </button>
                    </div>
                    <div id="lista-especialidades" class="lista-itens">
                        Carregando...
                    </div>
                </div>

                <!-- COLUNA 2: SUB-ESPECIALIDADES -->
                <div class="card-cadastro sub">
                    <h4 style="margin-top: 0; color: #a855f7; font-weight: 700; margin-bottom: 1rem;">Sub-Especialidades
                    </h4>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem;">
                        <select id="select-pai-especialidade" class="input-cadastro">
                            <option value="">-- Selecione a Especialidade Pai --</option>
                        </select>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="nova-sub-especialidade" class="input-cadastro"
                                placeholder="Ex: Terapia Cognitiva, Esportiva...">
                            <button class="btn-primary" onclick="salvarSubEspecialidade()"
                                style="padding: 0.5rem; background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); box-shadow: 0 10px 15px -3px rgba(168, 85, 247, 0.3);">
                                <span class="material-icons">add</span>
                            </button>
                        </div>
                    </div>
                    <div id="lista-sub-especialidades" class="lista-itens">
                        Selecione uma especialidade para gerenciar suas subcategorias.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
