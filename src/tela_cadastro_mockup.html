<!DOCTYPE html>
<html class="light" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MedPavilion SaaS - Cadastro Geral</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            prefix: 'tw-',
            corePlugins: { preflight: false },
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a73e8",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#40484f",
                        "outline": "#707880",
                        "error": "#d93025"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        /* TRAVA DE GEOMETRIA: Evita que os campos vazem do grid e montem uns nos outros */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden !important;
            height: auto !important;
            min-height: 100% !important;
            background-color: #f4f7f6 !important;
        }

        h1,
        h2,
        h3 {
            font-family: 'Manrope', sans-serif;
        }

        /* Animação suave de fade-in */
        .tw-fade-in-smooth {
            animation: fadeInSmooth 0.4s ease-out forwards;
        }

        @keyframes fadeInSmooth {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="tw-bg-[#f4f7f6] tw-text-on-surface">
    <main class="tw-min-h-screen">
        <div class="tw-p-4 md:tw-p-8 tw-max-w-full tw-mx-auto">
            <div class="tw-mb-10">
                <h1 class="tw-text-3xl md:tw-text-4xl tw-font-extrabold tw-text-on-surface tw-tracking-tight tw-mb-2">
                    Cadastro Geral</h1>
                <p class="tw-text-on-surface-variant tw-font-medium">Gerenciamento centralizado de especialidades,
                    produtos e corpo clínico.</p>
            </div>

            <div
                class="tw-flex tw-gap-1 tw-mb-8 tw-bg-white/50 tw-p-1 tw-rounded-[8px] tw-w-fit tw-border tw-border-[#ddd]">
                <button id="tab-1" onclick="switchTab(1)"
                    class="tw-h-[38px] tw-px-6 md:tw-px-8 tw-rounded-[8px] tw-bg-[#1a73e8] tw-text-white tw-font-bold tw-shadow-sm tw-transition-all tw-duration-200 tw-text-sm tw-inline-flex tw-items-center tw-justify-center tw-border-none tw-cursor-pointer hover:tw-brightness-110">
                    Especialidades e Produtos
                </button>
                <button id="tab-2" onclick="switchTab(2)"
                    class="tw-h-[38px] tw-px-6 md:tw-px-8 tw-rounded-[8px] tw-bg-transparent tw-text-slate-600 tw-font-medium hover:tw-bg-[#e0f2fe] hover:tw-text-primary tw-transition-all tw-duration-200 tw-text-sm tw-inline-flex tw-items-center tw-justify-center tw-border-none tw-cursor-pointer">
                    Especialistas
                </button>
            </div>

            <div id="content-1" class="tw-space-y-8">
                <div
                    class="tw-flex tw-flex-col sm:tw-flex-row tw-justify-between tw-items-start sm:tw-items-center tw-gap-4">
                    <h3 class="tw-text-xl tw-font-bold tw-text-primary tw-flex tw-items-center tw-gap-2">
                        <span class="material-symbols-outlined">category</span>
                        Estrutura Hierárquica
                    </h3>
                    <button onclick="window.parent.abrirModal('modal-nova-especialidade')"
                        class="tw-bg-[#1a73e8] tw-text-white tw-h-[38px] tw-px-5 tw-rounded-[8px] tw-text-sm tw-font-semibold tw-flex tw-items-center tw-justify-center tw-gap-2 tw-transition-colors hover:tw-bg-[#1557b0] hover:tw-brightness-110 tw-border-none tw-cursor-pointer">
                        <span class="material-symbols-outlined tw-text-sm">add_circle</span>
                        Nova Especialidade
                    </button>
                </div>
                <div id="container-hierarquia" class="tw-space-y-6">
                    <!-- Cards de Especialidade e Sub-especialidade injetados dinamicamente aqui -->
                    <div class="tw-p-10 tw-text-center tw-text-slate-400 tw-italic tw-text-sm">
                        Carregando estrutura...
                    </div>
                </div>
            </div>

            <div id="content-2" style="display: none;">
                <div class="tw-mt-12">
                    <div class="tw-flex tw-justify-between tw-items-center tw-mb-6">
                        <h3 class="tw-text-xl tw-font-bold tw-text-primary">Corpo Clínico</h3>
                        <div class="action-add tw-cursor-pointer"
                            style="width: 40px; height: 40px; border-radius: 50%; background: #1a73e8; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(26,115,232,0.3); transition: all 0.2s ease;"
                            onmouseover="this.style.filter='brightness(1.1)'"
                            onmouseout="this.style.filter='brightness(1)'"
                            onclick="window.parent.abrirModalNovoEspecialista()">
                            <span class="material-symbols-outlined"
                                style="font-size: 24px; color: white;">person_add</span>
                        </div>
                    </div>
                    <div
                        class="tw-bg-white tw-rounded-[8px] tw-shadow-sm tw-overflow-x-auto tw-border tw-border-[#eee]">
                        <table class="tw-w-full tw-text-left tw-min-w-[600px]">
                            <thead
                                class="tw-bg-[#f4f7f6] tw-text-[10px] tw-font-bold tw-uppercase tw-tracking-widest tw-text-slate-500 tw-border-b tw-border-[#eee]">
                                <tr>
                                    <th class="tw-px-6 tw-py-4">Especialista</th>
                                    <th class="tw-px-6 tw-py-4">Contato</th>
                                    <th class="tw-px-6 tw-py-4">Especialidades</th>
                                    <th class="tw-px-6 tw-py-4 tw-text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody class="tw-divide-y tw-divide-[#eee]">
                                <tr>
                                    <td colspan="4" class="tw-px-6 tw-py-10 tw-text-center tw-text-slate-400 tw-italic">
                                        Carregando corpo clínico...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let lastHeight = 0;
        let resizeTimer;

        function sendHeight() {
            const height = document.body.offsetHeight;
            const delta = Math.abs(height - lastHeight);
            if (delta > 15 || lastHeight === 0) {
                lastHeight = height;
                window.parent.postMessage({ type: 'resize-iframe', height: height }, '*');
            }
        }

        const debouncedSendHeight = () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(sendHeight, 150);
        };

        function switchTab(tab) {
            const btn1 = document.getElementById('tab-1');
            const btn2 = document.getElementById('tab-2');
            const content1 = document.getElementById('content-1');
            const content2 = document.getElementById('content-2');

            const activeClass = "tw-h-[38px] tw-px-6 md:tw-px-8 tw-rounded-[8px] tw-bg-[#1a73e8] tw-text-white tw-font-bold tw-shadow-sm tw-transition-all tw-duration-200 tw-text-sm tw-inline-flex tw-items-center tw-justify-center tw-border-none tw-cursor-pointer hover:tw-brightness-110";
            const inactiveClass = "tw-h-[38px] tw-px-6 md:tw-px-8 tw-rounded-[8px] tw-bg-transparent tw-text-slate-600 tw-font-medium hover:tw-bg-[#e0f2fe] hover:tw-text-primary tw-transition-all tw-duration-200 tw-text-sm tw-inline-flex tw-items-center tw-justify-center tw-border-none tw-cursor-pointer";

            if (tab === 1) {
                btn1.className = activeClass;
                btn2.className = inactiveClass;
                content1.style.display = "block";
                content1.className = "tw-space-y-8 tw-fade-in-smooth";
                content2.style.display = "none";
            } else {
                btn2.className = activeClass;
                btn1.className = inactiveClass;
                content1.style.display = "none";
                content2.style.display = "block";
                content2.className = "tw-fade-in-smooth";
                // Carrega especialistas ao alternar para a aba
                if (window.parent && typeof window.parent.carregarEspecialistas === 'function') {
                    window.parent.carregarEspecialistas();
                }
            }
            debouncedSendHeight();
        }

        window.onload = () => {
            sendHeight();
            const observer = new ResizeObserver(debouncedSendHeight);
            observer.observe(document.body);
        };
    </script>
</body>

</html>
